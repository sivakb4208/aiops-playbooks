---
- name: CPU Alert Handler
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Trigger CPU remediation on HighCPUUsage
      condition: event.payload.alerts[0].labels.alertname == "HighCPUUsage"
      action:
        run_job_template:
          name: CPU-Remediation-Playbook
          organization: Default
