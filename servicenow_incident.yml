---
- name: Create ServiceNow Incident from Alert
  hosts: localhost
  gather_facts: no
  become: no
  tasks:
    - name: Create ServiceNow Incident via REST API
      uri:
        url: "{{ sn_host }}/api/now/table/incident"
        method: POST
        user: "{{ sn_username }}"
        password: "{{ sn_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          short_description: "[AIOps] HighCPUUsage detected on 172.31.35.170"
          description: "Automated incident created by AIOps platform"
          impact: "2"
          urgency: "2"
          caller_id: "admin"
        status_code: 201
      register: snow_response

    - name: Print Incident Number
      debug:
        msg: "Incident created: {{ snow_response.json.result.number }}"
