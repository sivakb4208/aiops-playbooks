---
- name: CPU Remediation Playbook
  hosts: all
  become: yes
  tasks:
    - name: Kill high CPU consuming processes
      shell: |
        ps aux --sort=-%cpu | awk 'NR>1 && $3>80 {print $2}' | head -5 | xargs kill -9
      ignore_errors: yes
 
    - name: Log remediation action
      shell: echo '[{{ ansible_date_time.iso8601 }}] CPU remediation triggered' >> /var/log/aiops_remediation.log
